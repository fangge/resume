name: Build and Deploy
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # remove forcing actions to Node24 unless necessary
    # env:
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'    # use a broadly compatible LTS
          cache: 'npm'

      - name: Debug Node & Build
        run: |
          node -v
          npm -v
          npm ci --prefer-offline --no-audit
          npm run build --if-present --loglevel verbose

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          single-commit: true